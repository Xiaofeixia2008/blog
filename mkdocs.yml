---
site_name: 小飞侠的博客
site_author: Xiaofeixia
site_url: https://wstd.pages.dev
copyright: Copyright © 2025 Xiaofeixia
repo_url: https://github.com/Xiaofeixia2008/blog/
theme:
  name: material
  features:
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - navigation.footer
    # - navigation.indexes
    # - navigation.instant
    # - navigation.instant.prefetch
    # - navigation.instant.progress
    - navigation.prune
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
  language: zh
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: 切换到亮色模式
      primary: teal
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: 切换到暗色模式
      primary: teal
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: 切换到自动模式
      primary: teal
markdown_extensions:
  - attr_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.blocks.admonition
  - pymdownx.blocks.caption
  - pymdownx.blocks.details
  - pymdownx.blocks.tab:
      alternate_style: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      options:
        custom_icons:
          - overrides/.icons
  - pymdownx.fancylists
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      linenums: true
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys:
      camel_case: true
  - pymdownx.magiclink:
      repo_url_shortener: true
      user: Xiaofeixia2008
      repo: blog
      normalize_issue_symbols: true
  - pymdownx.mark
  - pymdownx.progressbar
  - pymdownx.saneheaders
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      disable_indented_code_blocks: true
      preserve_tabs: true
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde:
      smart_delete: false
  - mdx_truly_sane_lists
plugins:
  - search
  - blog:
      blog_toc: true
      categories_allowed:
        - MC开发
  - offline
  # - privacy:
  #     enabled: !ENV [CI, false]
  - social:
      enabled: !ENV [CI, false]
      cards_layout_options:
        font_family: Source Sans 3
  - tags
  - git-revision-date-localized:
      enable_creation_date: true
      fallback_to_build_date: true
  - rss:
      enabled: !ENV [CI, false]
      match_path: blog/posts/.*
      date_from_meta:
        as_creation: date.created
        as_update: date.updated
      categories:
        - categories
        - tags
  - encryptcontent:
      title_prefix: ''
      password_inventory:
          pwd: !!python/object/apply:os.getenv ["MKDOCS_ENCRYPT_PASSWORD"]
  - open-in-new-tab
nav:
  - 首页: index.md
  - 博客:
    - blog/index.md
  - 资料:
    - 2026 年学代会:
      - material/congress_2026/index.md
      - 全部提案:
        - material/congress_2026/all_proposal/proposal-1.md
        - material/congress_2026/all_proposal/proposal-2.md
        - material/congress_2026/all_proposal/proposal-3.md
        - material/congress_2026/all_proposal/proposal-4.md
        - material/congress_2026/all_proposal/proposal-5.md
        - material/congress_2026/all_proposal/proposal-6.md
        - material/congress_2026/all_proposal/proposal-7.md
        - material/congress_2026/all_proposal/proposal-8.md
        - material/congress_2026/all_proposal/proposal-9.md
        - material/congress_2026/all_proposal/proposal-10.md
        - material/congress_2026/all_proposal/proposal-11.md
        - material/congress_2026/all_proposal/proposal-12.md
        - material/congress_2026/all_proposal/proposal-13.md
        - material/congress_2026/all_proposal/proposal-14.md
        - material/congress_2026/all_proposal/proposal-15.md
        - material/congress_2026/all_proposal/proposal-16.md
        - material/congress_2026/all_proposal/proposal-17.md
        - material/congress_2026/all_proposal/proposal-18.md
        - material/congress_2026/all_proposal/proposal-19.md
        - material/congress_2026/all_proposal/proposal-20.md
        - material/congress_2026/all_proposal/proposal-21.md
        - material/congress_2026/all_proposal/proposal-22.md
        - material/congress_2026/all_proposal/proposal-23.md
        - material/congress_2026/all_proposal/proposal-24.md
        - material/congress_2026/all_proposal/proposal-25.md
        - material/congress_2026/all_proposal/proposal-26.md
        - material/congress_2026/all_proposal/proposal-27.md
  - 模板:
